name: PR Size Enforcement

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  label-and-check-size:
    name: Label PR by Size and Enforce Limit
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Compute diff size, apply label, and enforce limit
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo  = context.repo.repo;
            const prNumber = context.issue.number;

            // ── 1. Fetch PR diff stats ───────────────────────────────────────
            const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });

            const additions  = pr.additions;
            const deletions  = pr.deletions;
            const totalLines = additions + deletions;

            // ── 2. Determine size label ──────────────────────────────────────
            // Thresholds:  XS < 10 | S < 100 | M < 300 | L < 1000 | XL ≥ 1000
            const SIZE_TIERS = [
              { label: 'size/xs', color: '3cbf00', description: 'Extra-small PR (< 10 lines)',     max: 10   },
              { label: 'size/s',  color: '5d9e00', description: 'Small PR (10–99 lines)',          max: 100  },
              { label: 'size/m',  color: 'e6b800', description: 'Medium PR (100–299 lines)',       max: 300  },
              { label: 'size/l',  color: 'eb6420', description: 'Large PR (300–999 lines)',        max: 1000 },
              { label: 'size/xl', color: 'ee0701', description: 'Extra-large PR (≥ 1,000 lines)', max: Infinity },
            ];

            const tier = SIZE_TIERS.find(t => totalLines < t.max);

            // ── 3. Ensure all size labels exist in the repo ──────────────────
            for (const t of SIZE_TIERS) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: t.label });
              } catch {
                // Label doesn't exist yet — create it
                await github.rest.issues.createLabel({
                  owner, repo,
                  name: t.label,
                  color: t.color,
                  description: t.description,
                });
              }
            }

            // ── 4. Remove stale size labels from this PR ─────────────────────
            const { data: current } = await github.rest.issues.listLabelsOnIssue({
              owner, repo, issue_number: prNumber,
            });

            for (const l of current) {
              if (l.name.startsWith('size/')) {
                await github.rest.issues.removeLabel({
                  owner, repo, issue_number: prNumber, name: l.name,
                });
              }
            }

            // ── 5. Apply the correct size label ──────────────────────────────
            await github.rest.issues.addLabels({
              owner, repo, issue_number: prNumber, labels: [tier.label],
            });

            console.log(
              `PR #${prNumber}: +${additions} additions / -${deletions} deletions ` +
              `= ${totalLines} total lines → labelled "${tier.label}"`
            );

            // ── 6. Enforce 1,000-line hard limit ─────────────────────────────
            if (totalLines >= 1000) {
              // Post actionable guidance as a PR comment
              await github.rest.issues.createComment({
                owner, repo, issue_number: prNumber,
                body: [
                  '## ⚠️ PR Too Large — Please Split',
                  '',
                  `This PR touches **${totalLines} lines** ` +
                  `(+${additions} additions, \`-\`${deletions} deletions), ` +
                  `which exceeds the project's **1,000-line limit**.`,
                  '',
                  'Large PRs are hard to review, increase the risk of bugs slipping through, ',
                  'and slow down the merge queue for everyone. Please break this into smaller, ',
                  'focused PRs before requesting review.',
                  '',
                  '### Strategies for splitting a large PR',
                  '',
                  '| Strategy | When to use |',
                  '|---|---|',
                  '| **Separate by component** | Split `contract/`, `keeper/`, and `frontend/` changes into their own PRs |',
                  '| **Separate concerns** | Put refactors, new features, and bug fixes in different PRs |',
                  '| **Stack PRs** | Open a base PR with shared scaffolding, then layer feature PRs on top of it |',
                  '| **Docs separately** | Documentation-only changes can always be their own PR |',
                  '| **Test-first** | Open a PR that only adds tests, then a second PR that makes them pass |',
                  '',
                  '> **Exception:** If this change is genuinely atomic and cannot be meaningfully split, ',
                  '> please add a comment below explaining why. A maintainer can override this check.',
                ].join('\n'),
              });

              core.setFailed(
                `PR #${prNumber} exceeds the 1,000 line limit ` +
                `(${totalLines} lines changed). Please split it into smaller PRs.`
              );
            }
